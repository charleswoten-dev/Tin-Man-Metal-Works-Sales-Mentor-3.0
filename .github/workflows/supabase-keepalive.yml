name: Supabase keep-alive

# Free-tier Supabase projects auto-pause after ~7 days with no activity, which
# takes down BOTH apps (calculator email gate + Mentor login) since they share
# this project. This workflow makes one lightweight DB read on a schedule so the
# project never goes idle long enough to pause. It also fails loudly (red X +
# GitHub email) if the ping ever returns non-200, giving early warning that the
# backend is down.
#
# Setup (one time): add a repo secret named SUPABASE_ANON_KEY
#   GitHub → repo → Settings → Secrets and variables → Actions → New repository secret
#   Value = the project's anon/public key (Supabase → Project Settings → API → anon public).
#   The anon key is safe to use here — it already ships publicly in the frontend.

on:
  schedule:
    # 07:17 UTC every day. (Daily, not weekly, so a delayed/skipped run can never
    # let the 7-day idle window lapse. Odd minute avoids GitHub's top-of-hour
    # scheduling congestion.)
    - cron: '17 7 * * *'
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (keeps the project active)
        env:
          SUPABASE_URL: https://retufxuvstfupekimvhk.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_ANON_KEY secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          status=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/leads?select=id&limit=1")
          echo "Supabase REST responded with HTTP $status"
          if [ "$status" != "200" ]; then
            echo "::error::Keep-alive ping failed (HTTP $status). The Supabase project may be paused or down."
            exit 1
          fi
          echo "Keep-alive OK — project is active."
